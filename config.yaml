#         attendees:     {x: 309, y: 450, width: 800, height: 150}
#     back:
#       bg_file: "./papers/notebook_a_back.jpg"
#       start_y: 215
#       line_spacing: 71
#       font_size: 50
#       left_margin: 130
#       right_margin: 150
#       bottom_margin: 150

# 正文内容：两种方式
# 方式1：指定外部文件路径（适合长文本）
content_file: "content.txt"

# 方式2：直接写在这里（适合短文本），取消下行的注释并注释掉 content_file
# content: |
#   本次会议主要讨论了关于下季度项目推进的相关事宜。
#   首先，各部门负责人汇报了目前的进度，总体情况良好。
#   其次，针对目前存在的技术难点，大家进行了深入的探讨。

# 输出配置
output:
  prefix: "meeting_record"   # 输出文件名前缀
  format: "jpg"              # 输出格式（jpg / png）
