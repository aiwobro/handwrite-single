# =============================================
# 手写会议记录生成器配置文件
# =============================================
# 使用方法：将此文件复制为 config.yaml，然后修改内容
# 或使用 --config 参数指定其他配置文件
# =============================================

# 会议元数据
meta:
  year: "2025"
  month: "11"
  day: "23"
  venue: "会议室A"
  meeting_title: "关于2025年第三季度项目进度总结会议"
  chairperson: "张三"
  recorder: "李四"
  attendees: "王五，赵六"

# 纸张类型（默认使用当前 page1.jpg + page2.jpg 这一套）
paper_type: "default"

# 可选：新增/覆盖纸张预设
# 注意：每个预设都必须包含 front/back 完整配置；
#       front 需要额外提供 meta_position
# paper_presets:
#   notebook_a:
#     front:
#       bg_file: "./papers/notebook_a_front.jpg"
#       start_y: 567
#       line_spacing: 71
#       font_size: 50
#       left_margin: 150
#       right_margin: 130
#       bottom_margin: 150
#       meta_position:
#         year:          {x: 818, y: 133, width: 140, height: 80}
#         month:         {x: 923, y: 138, width: 80,  height: 80}
#         day:           {x: 980, y: 138, width: 80,  height: 80}
#         venue:         {x: 577, y: 235, width: 220, height: 80}
#         meeting_title: {x: 303, y: 345, width: 700, height: 120}
#         recorder:      {x: 888, y: 350, width: 200, height: 80}
