# =============================================
# 手写会议记录生成器配置文件
# =============================================
# 使用方法：将此文件复制为 config.yaml，然后修改内容
# 或使用 --config 参数指定其他配置文件
# =============================================

# 会议元数据
meta:
  year: "2025"
  month: "11"
  day: "23"
  venue: "会议室A"
  meeting_title: "关于2025年第三季度项目进度总结会议"
  chairperson: "张三"
  recorder: "李四"
  attendees: "王五，赵六"

# 正文内容：两种方式
# 方式1：指定外部文件路径（适合长文本）
content_file: "content.txt"

# 方式2：直接写在这里（适合短文本），取消下行的注释并注释掉 content_file
# content: |
#   本次会议主要讨论了关于下季度项目推进的相关事宜。
#   首先，各部门负责人汇报了目前的进度，总体情况良好。
#   其次，针对目前存在的技术难点，大家进行了深入的探讨。

# 输出配置
output:
  prefix: "meeting_record"   # 输出文件名前缀
  format: "jpg"              # 输出格式（jpg / png）
