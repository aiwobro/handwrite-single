<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会议记录手写生成</title>
  <style>
    :root {
      --bg: #eef6ff;
      --ink: #1c2f44;
      --card: #f8fcff;
      --line: #bfd4ea;
      --accent: #5e97cf;
      --accent-strong: #3e7fbe;
      --surface: #ffffff;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 85% 15%, #ffffff 0%, #e8f4ff 32%, #dbeeff 100%);
    }

    .wrap {
      max-width: clamp(820px, 88vw, 980px);
      margin: 24px auto;
      padding: 0 16px;
    }

    .main-layout {
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(49, 92, 133, 0.14);
    }

    .form-panel,
    .result-panel {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .form-panel {
      max-width: 560px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .date-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .date-field input {
      width: 100%;
      max-width: 88px;
    }

    input, select, textarea, button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--surface);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
    }

    button:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(62, 127, 190, 0.32);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error {
      margin: 12px 0 0;
      color: #c73030;
      font-weight: 600;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      max-width: 760px;
      margin: 0 auto;
    }

    .loading-panel {
      display: none;
      min-height: 360px;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .loading-panel.show {
      display: flex;
    }

    .loading-content {
      width: min(420px, 92%);
      padding: 14px;
    }

    .loading-title {
      margin: 0 0 10px;
      font-size: 18px;
      color: #2f5f8f;
      font-weight: 700;
    }

    .loading-subtitle {
      margin: 0 0 14px;
      font-size: 14px;
      color: #4b6f91;
    }

    .loading-track {
      position: relative;
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #dcecff;
      border: 1px solid #b7d3ef;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #68a4da 0%, #8bc0ef 100%);
      transition: width 0.45s ease;
      position: relative;
    }

    .loading-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0) 15%,
        rgba(255, 255, 255, 0.45) 45%,
        rgba(255, 255, 255, 0) 75%
      );
      animation: loading-shine 1.1s linear infinite;
    }

    .loading-percent {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #2b5f92;
      letter-spacing: 0.5px;
    }

    @keyframes loading-shine {
      from {
        transform: translateX(-120%);
      }
      to {
        transform: translateX(120%);
      }
    }

    .result-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .secondary-btn {
      background: #e8f3ff;
      color: #25517b;
      border: 1px solid #9fc3e8;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .secondary-btn:hover {
      background: #dcedff;
      color: #1e4265;
      box-shadow: none;
      transform: none;
    }

    .image-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      padding: 8px;
      box-shadow: 0 6px 18px rgba(72, 123, 170, 0.12);
      min-width: 0;
    }

    .thumb-btn {
      display: block;
      width: 100%;
      border: none;
      background: none;
      padding: 0;
      cursor: zoom-in;
    }

    .thumb-img {
      display: block;
      width: 100%;
      max-width: 220px;
      height: 290px;
      object-fit: contain;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f4f9ff;
    }

    .thumb-note {
      margin: 8px 0 2px;
      font-size: 13px;
      color: #4b6f91;
      text-align: center;
    }

    .card-actions {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(19, 46, 74, 0.72);
      z-index: 999;
    }

    .lightbox.show {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: min(1100px, 96vw);
      max-height: 92vh;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f9fcff;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      padding: 36px 16px 16px;
    }

    .lightbox-close {
      position: absolute;
      right: 10px;
      top: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #9dbde0;
      background: #eaf4ff;
      color: #27537f;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .lightbox-download {
      position: absolute;
      left: 12px;
      top: 8px;
      font-size: 13px;
    }

    .lightbox-tools {
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 3;
    }

    .lightbox-tools .secondary-btn {
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.2;
    }

    .lightbox-tools .secondary-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .lightbox-zoom-level {
      min-width: 52px;
      text-align: center;
      font-size: 12px;
      color: #2d5f8f;
      font-weight: 700;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid #9dbde0;
      background: rgba(234, 244, 255, 0.95);
      color: #285783;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .lightbox-nav:hover {
      background: #d9ebff;
      box-shadow: none;
      transform: translateY(-50%);
    }

    .lightbox-nav.prev {
      left: 10px;
    }

    .lightbox-nav.next {
      right: 10px;
    }

    .lightbox-stage {
      max-height: calc(92vh - 88px);
      overflow: auto;
      padding: 4px 42px 0;
    }

    .lightbox-img {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: none;
      margin: 0 auto;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface);
      transform-origin: top center;
      transition: transform 0.16s ease;
    }

    @media (min-width: 1180px) {
      .wrap {
        max-width: min(1320px, 94vw);
      }

      .main-layout.has-images {
        display: flex;
        align-items: stretch;
        gap: 18px;
      }

      .main-layout.has-images > .panel {
        min-width: 0;
      }

      .main-layout.has-images .form-panel {
        position: static;
        flex: 0 0 500px;
        max-width: 500px;
        margin: 0;
      }

      .main-layout.has-images .result-panel {
        flex: 1 1 auto;
        max-width: none;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      .main-layout.has-images .images-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: 660px;
        height: 100%;
        align-content: start;
      }
    }

    @media (max-width: 1024px) {
      .wrap {
        max-width: 920px;
      }

      .form-panel {
        max-width: 620px;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .images-grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      }

      .thumb-img {
        height: 260px;
      }

      .loading-panel {
        min-height: 320px;
      }
    }

    @media (max-width: 800px) {
      .wrap {
        margin: 14px auto;
        padding: 0 12px;
      }

      .panel {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .images-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .thumb-img {
        max-width: 100%;
        height: 220px;
      }

      .loading-panel {
        min-height: 280px;
      }

      .lightbox {
        padding: 10px;
      }

      .lightbox-inner {
        width: 100%;
        max-height: 94vh;
        padding: 40px 10px 10px;
      }

      .lightbox-nav {
        width: 34px;
        height: 34px;
      }

      .lightbox-nav.prev {
        left: 6px;
      }

      .lightbox-nav.next {
        right: 6px;
      }

      .lightbox-tools {
        top: 6px;
        gap: 4px;
      }

      .lightbox-tools .secondary-btn {
        padding: 5px 8px;
        font-size: 11px;
      }

      .lightbox-zoom-level {
        min-width: 46px;
      }

      .lightbox-stage {
        max-height: calc(94vh - 102px);
        padding: 4px 28px 0;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 20px;
      }

      .images-grid {
        grid-template-columns: 1fr;
      }

      .thumb-img {
        height: 200px;
      }

      .loading-title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="main-layout{% if images %} has-images{% endif %}" id="mainLayout">
    <div class="panel form-panel">
      <h1>会议记录手写生成</h1>
      <form method="post" action="/generate" id="generateForm">
        <div class="grid">
          <div class="field full date-row">
            <label class="field date-field">
              <span>年份</span>
              <input name="year" value="{{ form_data.get('year', '') }}" placeholder="2026">
            </label>
            <label class="field date-field">
              <span>月份</span>
              <input name="month" value="{{ form_data.get('month', '') }}" placeholder="3">
            </label>
            <label class="field date-field">
              <span>日期</span>
              <input name="day" value="{{ form_data.get('day', '') }}" placeholder="28">
            </label>
          </div>
          <label class="field full">
            <span>会议地点</span>
            <input name="venue" value="{{ form_data.get('venue', '') }}" placeholder="会议室A">
          </label>
          <label class="field full">
            <span>会议标题</span>
            <input name="meeting_title" value="{{ form_data.get('meeting_title', '') }}" placeholder="关于项目进度总结会议">
          </label>
          <label class="field">
            <span>主持人</span>
            <input name="chairperson" value="{{ form_data.get('chairperson', '') }}" placeholder="张三">
          </label>
          <label class="field">
            <span>记录人</span>
            <input name="recorder" value="{{ form_data.get('recorder', '') }}" placeholder="李四">
          </label>
          <label class="field">
            <span>参会人</span>
            <input name="attendees" value="{{ form_data.get('attendees', '') }}" placeholder="王五，赵六">
          </label>
          <label class="field">
            <span>纸张类型</span>
            <select name="paper_type">
              {% for paper_type_name in paper_types %}
              <option value="{{ paper_type_name }}" {% if form_data.get('paper_type', default_paper_type) == paper_type_name %}selected{% endif %}>{{ paper_type_name }}</option>
              {% endfor %}
            </select>
          </label>
          <label class="field full">
            <span>随机种子（可选）</span>
            <input name="seed" value="{{ form_data.get('seed', '') }}" placeholder="42">
          </label>
          <label class="field full">
            <span>会议正文</span>
            <textarea name="content" placeholder="请输入会议正文内容...">{{ form_data.get('content', '') }}</textarea>
          </label>
          <div class="field full">
            <button type="submit" id="generateBtn">生成手写图片</button>
          </div>
        </div>
      </form>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </div>

    <div class="panel result-panel loading-panel" id="generationPreview" aria-live="polite" aria-hidden="true">
      <div class="loading-content">
        <p class="loading-title">图片正在生成中</p>
        <p class="loading-subtitle">系统正在排版并渲染手写内容，请稍候...</p>
        <div class="loading-track">
          <div class="loading-fill" id="loadingFill"></div>
        </div>
        <div class="loading-percent" id="loadingPercent">0%</div>
      </div>
    </div>

    {% if images %}
    <div class="panel result-panel">
      <div class="result-toolbar">
        <button type="button" class="secondary-btn" id="saveAllBtn">一键保存全部</button>
      </div>
      <div class="images-grid">
        {% for image in images %}
        <div class="image-card">
          <button type="button" class="thumb-btn" data-src="{{ image }}" aria-label="查看第{{ loop.index }}张大图">
            <img class="thumb-img" src="{{ image }}" alt="生成结果 {{ loop.index }}" loading="lazy">
          </button>
          <p class="thumb-note">第 {{ loop.index }} 页（点击放大）</p>
          <div class="card-actions">
            <a class="secondary-btn" href="{{ image }}" download>保存本页</a>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endif %}
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button type="button" class="lightbox-nav prev" id="lightboxPrev" aria-label="上一张">‹</button>
      <button type="button" class="lightbox-nav next" id="lightboxNext" aria-label="下一张">›</button>
      <a class="secondary-btn lightbox-download" id="lightboxDownload" href="#" download>保存此图</a>
      <div class="lightbox-tools">
        <button type="button" class="secondary-btn" id="zoomOutBtn" aria-label="缩小图片">缩小</button>
        <span class="lightbox-zoom-level" id="zoomLevelText">100%</span>
        <button type="button" class="secondary-btn" id="zoomInBtn" aria-label="放大图片">放大</button>
        <button type="button" class="secondary-btn" id="zoomResetBtn" aria-label="重置缩放">重置</button>
      </div>
      <button type="button" class="lightbox-close" id="lightboxClose" aria-label="关闭预览">×</button>
      <div class="lightbox-stage" id="lightboxStage">
        <img class="lightbox-img" id="lightboxImg" src="" alt="大图预览">
      </div>
    </div>
  </div>

  <script>
    (function () {
      const mainLayout = document.getElementById("mainLayout");
      const generateForm = document.getElementById("generateForm");
      const generateBtn = document.getElementById("generateBtn");
      const generationPreview = document.getElementById("generationPreview");
      const loadingFill = document.getElementById("loadingFill");
      const loadingPercent = document.getElementById("loadingPercent");

      if (generateForm && generationPreview && loadingFill && loadingPercent) {
        let progressValue = 0;
        let progressTimer = null;

        function tickProgress() {
          const cap = 94;
          if (progressValue >= cap) {
            return;
          }
          const remaining = cap - progressValue;
          const step = Math.max(1, Math.ceil(remaining * (0.08 + Math.random() * 0.08)));
          progressValue = Math.min(cap, progressValue + step);
          loadingFill.style.width = `${progressValue}%`;
          loadingPercent.textContent = `${progressValue}%`;
        }

        generateForm.addEventListener("submit", () => {
          progressValue = 6;
          loadingFill.style.width = `${progressValue}%`;
          loadingPercent.textContent = `${progressValue}%`;

          generationPreview.classList.add("show");
          generationPreview.setAttribute("aria-hidden", "false");
          if (mainLayout) {
            mainLayout.classList.add("has-images");
          }
          if (generateBtn) {
            generateBtn.disabled = true;
            generateBtn.textContent = "生成中...";
          }

          if (progressTimer) {
            window.clearInterval(progressTimer);
          }
          progressTimer = window.setInterval(tickProgress, 360);
        });
      }

      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightboxImg");
      const closeBtn = document.getElementById("lightboxClose");
      const prevBtn = document.getElementById("lightboxPrev");
      const nextBtn = document.getElementById("lightboxNext");
      const downloadBtn = document.getElementById("lightboxDownload");
      const lightboxStage = document.getElementById("lightboxStage");
      const zoomOutBtn = document.getElementById("zoomOutBtn");
      const zoomInBtn = document.getElementById("zoomInBtn");
      const zoomResetBtn = document.getElementById("zoomResetBtn");
      const zoomLevelText = document.getElementById("zoomLevelText");
      const saveAllBtn = document.getElementById("saveAllBtn");
      const thumbButtons = document.querySelectorAll(".thumb-btn");
      const imageItems = Array.from(thumbButtons).map((btn) => {
        const img = btn.querySelector("img");
        return {
          src: btn.getAttribute("data-src") || "",
          alt: img ? img.alt : "大图预览",
        };
      });
      let currentIndex = 0;
      let zoomLevel = 1;
      const ZOOM_MIN = 0.6;
      const ZOOM_MAX = 3;
      const ZOOM_STEP = 0.2;

      if (!lightbox || !lightboxImg || !closeBtn || !downloadBtn || thumbButtons.length === 0) {
        return;
      }

      function updateZoomView() {
        lightboxImg.style.transform = `scale(${zoomLevel})`;
        if (zoomLevelText) {
          zoomLevelText.textContent = `${Math.round(zoomLevel * 100)}%`;
        }
        if (zoomOutBtn) {
          zoomOutBtn.disabled = zoomLevel <= ZOOM_MIN + 0.001;
        }
        if (zoomInBtn) {
          zoomInBtn.disabled = zoomLevel >= ZOOM_MAX - 0.001;
        }
      }

      function setZoom(nextZoom) {
        const limited = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, nextZoom));
        zoomLevel = Math.round(limited * 100) / 100;
        updateZoomView();
      }

      function resetZoom() {
        zoomLevel = 1;
        if (lightboxStage) {
          lightboxStage.scrollTop = 0;
          lightboxStage.scrollLeft = 0;
        }
        updateZoomView();
      }

      function getFileName(src, fallbackName) {
        if (!src) {
          return fallbackName;
        }
        const raw = src.split("?")[0].split("#")[0];
        const name = raw.substring(raw.lastIndexOf("/") + 1);
        return name || fallbackName;
      }

      function renderLightbox(index) {
        if (imageItems.length === 0) {
          return;
        }
        currentIndex = (index + imageItems.length) % imageItems.length;
        const item = imageItems[currentIndex];
        const fallbackName = `page_${currentIndex + 1}.jpg`;

        lightboxImg.src = item.src;
        lightboxImg.alt = item.alt;
        downloadBtn.href = item.src;
        downloadBtn.download = getFileName(item.src, fallbackName);
        resetZoom();
      }

      function openLightbox(index) {
        renderLightbox(index);
        lightbox.classList.add("show");
      }

      function closeLightbox() {
        lightbox.classList.remove("show");
        resetZoom();
        lightboxImg.src = "";
      }

      function downloadBySrc(src, fallbackName) {
        if (!src) {
          return;
        }
        const link = document.createElement("a");
        link.href = src;
        link.download = getFileName(src, fallbackName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      thumbButtons.forEach((btn, index) => {
        btn.addEventListener("click", () => {
          openLightbox(index);
        });
      });

      if (prevBtn) {
        prevBtn.addEventListener("click", () => {
          renderLightbox(currentIndex - 1);
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener("click", () => {
          renderLightbox(currentIndex + 1);
        });
      }

      if (zoomOutBtn) {
        zoomOutBtn.addEventListener("click", () => {
          setZoom(zoomLevel - ZOOM_STEP);
        });
      }

      if (zoomInBtn) {
        zoomInBtn.addEventListener("click", () => {
          setZoom(zoomLevel + ZOOM_STEP);
        });
      }

      if (zoomResetBtn) {
        zoomResetBtn.addEventListener("click", () => {
          resetZoom();
        });
      }

      if (saveAllBtn) {
        saveAllBtn.addEventListener("click", () => {
          imageItems.forEach((item, index) => {
            setTimeout(() => {
              downloadBySrc(item.src, `page_${index + 1}.jpg`);
            }, index * 180);
          });
        });
      }

      if (imageItems.length <= 1) {
        if (prevBtn) {
          prevBtn.style.display = "none";
        }
        if (nextBtn) {
          nextBtn.style.display = "none";
        }
      }

      closeBtn.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (!lightbox.classList.contains("show")) {
          return;
        }
        if (event.key === "Escape") {
          closeLightbox();
          return;
        }
        if (event.key === "ArrowLeft") {
          renderLightbox(currentIndex - 1);
          return;
        }
        if (event.key === "ArrowRight") {
          renderLightbox(currentIndex + 1);
          return;
        }
        if (event.key === "+" || event.key === "=") {
          event.preventDefault();
          setZoom(zoomLevel + ZOOM_STEP);
          return;
        }
        if (event.key === "-" || event.key === "_") {
          event.preventDefault();
          setZoom(zoomLevel - ZOOM_STEP);
          return;
        }
        if (event.key === "0") {
          event.preventDefault();
          resetZoom();
        }
      });

      updateZoomView();
    })();
  </script>
</body>
</html>
