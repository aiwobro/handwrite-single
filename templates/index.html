<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会议记录手写生成</title>
  <style>
    :root {
      --bg: #f7f4ea;
      --ink: #232018;
      --card: #fffdf6;
      --line: #d8d1bb;
      --accent: #7b4f2a;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #f9f6ec 0%, #efe7d0 100%);
    }

    .wrap {
      max-width: 1080px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(60, 40, 20, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    input, textarea, button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    .error {
      margin: 12px 0 0;
      color: #b10020;
      font-weight: 600;
    }

    .images {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .images img {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>会议记录手写生成</h1>
      <form method="post" action="/generate">
        <div class="grid">
          <label class="field">
            <span>年份</span>
            <input name="year" value="{{ form_data.get('year', '') }}" placeholder="2026">
          </label>
          <label class="field">
            <span>月份</span>
            <input name="month" value="{{ form_data.get('month', '') }}" placeholder="3">
          </label>
          <label class="field">
            <span>日期</span>
            <input name="day" value="{{ form_data.get('day', '') }}" placeholder="28">
          </label>
          <label class="field full">
            <span>会议地点</span>
            <input name="venue" value="{{ form_data.get('venue', '') }}" placeholder="会议室A">
          </label>
          <label class="field full">
            <span>会议标题</span>
            <input name="meeting_title" value="{{ form_data.get('meeting_title', '') }}" placeholder="关于项目进度总结会议">
          </label>
          <label class="field">
            <span>主持人</span>
            <input name="chairperson" value="{{ form_data.get('chairperson', '') }}" placeholder="张三">
          </label>
          <label class="field">
            <span>记录人</span>
            <input name="recorder" value="{{ form_data.get('recorder', '') }}" placeholder="李四">
          </label>
          <label class="field">
            <span>参会人</span>
            <input name="attendees" value="{{ form_data.get('attendees', '') }}" placeholder="王五，赵六">
          </label>
          <label class="field full">
            <span>随机种子（可选）</span>
            <input name="seed" value="{{ form_data.get('seed', '') }}" placeholder="42">
          </label>
          <label class="field full">
            <span>会议正文</span>
            <textarea name="content" placeholder="请输入会议正文内容...">{{ form_data.get('content', '') }}</textarea>
          </label>
          <div class="field full">
            <button type="submit">生成手写图片</button>
          </div>
        </div>
      </form>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </div>

    {% if images %}
    <div class="panel images">
      {% for image in images %}
      <img src="{{ image }}" alt="生成结果 {{ loop.index }}">
      {% endfor %}
    </div>
    {% endif %}
  </div>
</body>
</html>
